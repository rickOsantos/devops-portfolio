name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  terraform-plan:
    runs-on: ubuntu-latest
    env:
      TERRAFORM_VERSION: 1.6.5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        working-directory: ./02-terraform-aws
        run: terraform init

      - name: Terraform Plan
        working-directory: ./02-terraform-aws
        run: terraform plan

  build-and-deploy:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      DOCKER_IMAGE: rickosantos/devops-portfolio
      TERRAFORM_VERSION: 1.6.5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------- Docker Build --------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build Docker image (app-to-container)
        working-directory: ./01-docker-multi-container
        run: |
          docker build -t $DOCKER_IMAGE:latest .

      - name: Push Docker image
        run: |
          docker push $DOCKER_IMAGE:latest

      # -------------------- Terraform IaC --------------------
      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        working-directory: ./02-terraform-aws
        run: terraform init

      - name: Terraform Plan
        working-directory: ./02-terraform-aws
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        working-directory: ./02-terraform-aws
        run: terraform apply -auto-approve tfplan

      # -------------------- Kubernetes Deploy --------------------
      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.28.0"

      - name: Deploy to Kubernetes
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          echo "$KUBE_CONFIG_DATA" | base64 -d > $HOME/.kube/config
          kubectl apply -f ./01-docker-multi-container/k8s-manifests
